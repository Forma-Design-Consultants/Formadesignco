<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FORMA | Partner Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpeg" href="logo1.jpg">
    <style>
        /* ================= NAVIGATION SYNC (MASTER) ================= */
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --header-height: 100px;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #eee;
            width: 100%;
            position: fixed; 
            top: 0;
            left: 0;
            z-index: 3000;
            height: var(--header-height);
        }

        .nav-container {
            display: flex;
            justify-content: space-between; 
            align-items: center;
            width: 100%;
            padding: 0 40px;
            height: 100%;
            box-sizing: border-box;
        }

        .logo { height: 85px; width: auto; transition: height 0.3s ease; }

        .nav-right-group {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: #000;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        nav ul li a.active {
            font-weight: 700;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        .nav-cta-btn {
            background-color: #000;
            color: #fff !important;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-decoration: none;
            border: 1px solid #000;
            transition: all 0.3s ease;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-cta-btn:hover {
            background-color: #fff;
            color: #000 !important;
        }

        /* ================= MOBILE NAVIGATION OVERRIDES ================= */
        @media (max-width: 768px) {
            header { height: auto; padding: 10px 0; }
            .nav-container { flex-direction: column; gap: 10px; }
            .logo { height: 50px; }
            .nav-right-group { flex-direction: column; gap: 10px; width: 100%; padding-bottom: 10px; }
            nav ul { gap: 10px; flex-wrap: wrap; justify-content: center; }
            nav ul li a { font-size: 9px; }
            .nav-cta-btn { padding: 8px 16px; font-size: 9px; width: 80%; text-align: center; }
            
            /* Spacing adjustment for partner header on mobile */
            .partner-container { padding-top: 280px !important; }
        }

        /* ================= PARTNER CONTENT (REST UNTOUCHED) ================= */
        body { 
            background-color: #000000; 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            color: #fff; 
            -webkit-font-smoothing: antialiased;
        }
        
        .partner-container {
            max-width: 800px;
            margin: 0 auto;
            padding: calc(var(--header-height) + 60px) 20px 100px 20px;
        }

        .partner-header { text-align: center; margin-bottom: 60px; }
        .partner-header span { 
            font-size: 10px; 
            letter-spacing: 5px; 
            color: #555; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 600; 
        }
        .partner-header h1 { 
            font-size: clamp(28px, 6vw, 36px); 
            letter-spacing: 2px; 
            margin: 0; 
            font-weight: 400; 
            text-transform: uppercase; 
        }
        .partner-header p { 
            color: #888; 
            font-size: 14px; 
            margin-top: 20px; 
            line-height: 1.8; 
            max-width: 550px; 
            margin-left: auto; 
            margin-right: auto; 
        }

        .form-card {
            background: #ffffff;
            padding: 50px;
            border: 1px solid #1a1a1a;
            color: #000000;
        }

        .form-group { margin-bottom: 30px; }
        
        label { 
            display: block; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 12px; 
            color: #000;
            font-weight: 700;
        }

        input[type="text"],
        input[type="email"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 15px 0;
            border: none;
            border-bottom: 2px solid #000000; 
            background: transparent;
            font-family: inherit;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            color: #000;
            border-radius: 0;
        }

        input:focus, textarea:focus { border-bottom-color: #666; }

        .submit-area { margin-top: 50px; }

        #contractor-form button {
            width: 100%;
            padding: 22px;
            background: #000;
            color: #fff;
            border: 1px solid #000;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #contractor-form button:hover { 
            background: #333; 
            border-color: #333;
            transform: translateY(-2px);
        }

        #contractor-status {
            margin-top: 25px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: none;
            padding: 18px;
            border: 1px solid #000;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .form-card { padding: 40px 20px; }
        }

        footer {
            background-color: #000; 
            color: #fff; 
            padding: 80px 0; 
            text-align: center; 
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html">
                <img src="https://customer-assets.emergentagent.com/job_forma-build/artifacts/zipfdj6c_logo1.jpg" alt="FORMA Logo" class="logo">
            </a>
            <div class="nav-right-group">
                <nav>
                    <ul>
                        <li><a href="index.html">HOME</a></li>
                        <li><a href="services.html">SERVICES</a></li>
                        <li><a href="packages.html">PACKAGES</a></li>
                        <li><a href="process.html">PROCESS</a></li>
                        <li><a href="locations.html">LOCATIONS</a></li> 
                        <li><a href="contact.html" class="active">CONTACT</a></li>
                    </ul>
                </nav>
                <a href="estimate.html" class="nav-cta-btn">Free Estimate</a>
            </div>
        </div>
    </header>

    <div class="partner-container">
        <div class="partner-header">
            <span>NETWORK EXPANSION</span>
            <h1>Partner with Forma</h1>
            <p>We provide licensed contractors with vetted, design-ready residential projects. Submit your credentials to join our preferred vendor list.</p>
        </div>

        <div class="form-card">
            <form id="contractor-form">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="Legal Entity Name" required>
                </div>

                <div class="form-group">
                    <label>Contact Name</label>
                    <input type="text" name="contact_person" placeholder="Primary Contact" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="user_email" placeholder="email@company.com" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="user_phone" placeholder="+1 (000) 000-0000" required>
                </div>

                <div class="submit-area">
                    <button type="submit">Submit Credentials</button>
                    <div id="contractor-status"></div>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <img src="https://customer-assets.emergentagent.com/job_forma-build/artifacts/zipfdj6c_logo1.jpg" style="width: 100px; filter: invert(1); margin-bottom: 20px;">
        <p style="font-size: 10px; letter-spacing: 2px; opacity: 0.5;">© 2026 FORMA DESIGN CONSULTANTS</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("alap2C2Fda-y4hFG8"); 
        })();
    </script>
    <script src="form-handler.js"></script>

</body>
</html>
