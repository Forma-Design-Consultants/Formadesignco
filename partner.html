<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMA | Partner Application</title>
    <link rel="stylesheet" href="style.css">
    <style>
    :root {
        --safe-top: env(safe-area-inset-top, 20px);
    }

    body { background-color: #000000; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }
    
    .partner-container {
        max-width: 800px;
        margin: 0 auto;
        padding: calc(120px + var(--safe-top)) 20px 100px 20px;
    }

    .partner-header { text-align: center; margin-bottom: 60px; }
    .partner-header span { 
        font-size: 10px; 
        letter-spacing: 5px; 
        color: #c0c0c0; 
        text-transform: uppercase; 
        display: block; 
        margin-bottom: 15px; 
        font-weight: 600; 
    }
    .partner-header h1 { 
        font-size: clamp(28px, 6vw, 36px); 
        letter-spacing: 2px; 
        margin: 0; 
        font-weight: 400; 
        text-transform: uppercase; 
        color: #ffffff; 
    }
    .partner-header p { 
        color: #ffffff; 
        font-size: 14px; 
        margin-top: 20px; 
        line-height: 1.8; 
        max-width: 550px; 
        margin-left: auto; 
        margin-right: auto; 
    }

    /* Architectural Dossier Card */
    .form-card {
        background: #ffffff;
        padding: 50px;
        border: 1px solid #000000; /* Darker border for contrast against black */
        color: #000000;
    }

    .form-group { margin-bottom: 30px; }
    
    label { 
        display: block; 
        font-size: 10px; 
        text-transform: uppercase; 
        letter-spacing: 2px; 
        margin-bottom: 12px; 
        color: #000;
        font-weight: 700;
    }

    input[type="text"],
    input[type="email"],
    input[type="url"],
    textarea {
        width: 100%;
        padding: 15px 0;
        border: none;
        border-bottom: 2px solid #000000; /* Subtle underline */
        background: transparent;
        font-family: inherit;
        font-size: 15px;
        box-sizing: border-box;
        outline: none;
        transition: all 0.3s ease;
        color: #000;
        border-radius: 0;
    }

    /* Animated underline on focus */
    input:focus, textarea:focus { border-bottom-color: #000; }

    .submit-area { margin-top: 50px; }

    #contractor-form button {
        width: 100%;
        padding: 22px;
        background: #000;
        color: #fff;
        border: 1px solid #000;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }

    #contractor-form button:hover { 
        background: #333; 
        border-color: #333;
        transform: translateY(-2px);
    }

    #contractor-form button:active { transform: translateY(0); }

    #contractor-form button:disabled { 
        background: #ffffff; 
        color: #ffffff; 
        border-color: #ffffff; 
        cursor: not-allowed; 
    }

    #contractor-status {
        margin-top: 25px;
        text-align: center;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        display: none;
        padding: 18px;
        border: 1px solid #000;
        font-weight: 600;
    }

    @media (max-width: 600px) {
        .form-card { padding: 40px 20px; }
        .partner-container { padding-top: 100px; }
    }
</style>
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <img src="https://customer-assets.emergentagent.com/job_forma-build/artifacts/zipfdj6c_logo1.jpg" alt="FORMA" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="services.html">SERVICES</a></li>
                    <li><a href="packages.html">PACKAGES</a></li>
                    <li><a href="process.html">PROCESS</a></li>
                    <li><a href="locations.html">LOCATIONS</a></li>
                    <li><a href="team.html">ABOUT US</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="partner-container">
        <div class="partner-header">
            <span>NETWORK EXPANSION</span>
            <h1>Partner with Forma</h1>
            <p>We provide licensed contractors with vetted, design-ready residential projects. Submit your credentials to join our preferred vendor list.</p>
        </div>

        <div class="form-card">
            <form id="contractor-form">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="Legal Entity Name" required>
                </div>

                <div class="form-group">
                    <label>Contact Name</label>
                    <input type="text" name="contact_person" placeholder="Primary Contact" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="user_email" placeholder="email@company.com" required>
                </div>

                <div class="form-group">
                    <label>License Number & State</label>
                    <input type="text" name="license_info" placeholder="CSLB # or equivalent" required>
                </div>

                <div class="form-group">
                    <label>Portfolio / Website URL</label>
                    <input type="url" name="portfolio_url" placeholder="https://www.yourwork.com">
                </div>

                <div class="form-group">
                    <label>Primary Service Area</label>
                    <input type="text" name="service_area" placeholder="e.g. Los Angeles, CA or Salt Lake City, UT" required>
                </div>

                <div class="submit-area">
                    <button type="submit">Submit Credentials</button>
                    <div id="contractor-status"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("alap2C2Fda-y4hFG8"); 
        })();
    </script>
    <script src="form-handler.js"></script>

</body>
</html>
