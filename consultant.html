<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMA | Free Consultation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #000000; margin: 0; font-family: 'Inter', sans-serif; color: #ffffff; }
        
        .consult-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 140px 20px 100px 20px;
        }

        .consult-header { text-align: center; margin-bottom: 60px; }
        .consult-header span { font-size: 10px; letter-spacing: 4px; color: #ffffff; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .consult-header h1 { font-size: 36px; letter-spacing: 2px; margin: 0; font-weight: 400; text-transform: uppercase; }
        .consult-header p { color: #ffffff; font-size: 14px; margin-top: 15px; line-height: 1.6; }

        .form-card {
            background: #fafafa;
            padding: 50px;
            border: 1px solid #000000;
        }

        .form-group { margin-bottom: 25px; }
        
        label { 
            display: block; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px; 
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #000000;
            background: #fff;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus { border-color: #000; }

        .submit-area { margin-top: 40px; }

        /* ID matches submit-btn in your JS */
        #submit-btn {
            width: 100%;
            padding: 20px;
            background: #000;
            color: #fff;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        #submit-btn:hover { background: #333; }
        #submit-btn:disabled { background: #888; cursor: not-allowed; }

        /* ID matches form-status in your JS */
        #form-status {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            display: none;
            padding: 15px;
        }

        .status-success { background: #e6f4ea; color: #1e7e34; border: 1px solid #1e7e34; }
        .status-error { background: #fce8e6; color: #d93025; border: 1px solid #d93025; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <img src="https://customer-assets.emergentagent.com/job_forma-build/artifacts/zipfdj6c_logo1.jpg" alt="FORMA" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="services.html">SERVICES</a></li>
                    <li><a href="packages.html">PACKAGES</a></li>
                    <li><a href="process.html">PROCESS</a></li>
                    <li><a href="locations.html">LOCATIONS</a></li>
                    <li><a href="team.html">ABOUT US</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="consult-container">
        <div class="consult-header">
            <span>READY TO BUILD</span>
            <h1>Schedule Consultation</h1>
            <p>Tell us about your project. Our team will review your details and respond within 24–48 hours to schedule your free design session.</p>
        </div>

        <div class="form-card">
            <form id="contact-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="user_name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="user_email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Project Type</label>
                    <select name="project_type">
                        <option value="adu">ADU / Garage Conversion</option>
                        <option value="ground-up">Ground-Up Residential</option>
                        <option value="architectural">Architectural Design Only</option>
                        <option value="commercial">Commercial Development</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tell us about your project...</label>
                    <textarea name="message" rows="5" placeholder="Project location, goals, and vision..." required></textarea>
                </div>

                <div class="submit-area">
                    <button type="submit" id="submit-btn">Transmit Inquiry</button>
                    <div id="form-status"></div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            // BE SURE TO ADD YOUR KEY HERE
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();
    </script>
    <script src="form-handler.js"></script>

</body>
</html>
